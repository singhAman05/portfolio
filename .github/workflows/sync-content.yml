name: Sync Blog Content

on:
  repository_dispatch:
    types: [content-sync]
  workflow_dispatch: # Manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch LLD-System_Design content
        uses: actions/checkout@v4
        with:
          repository: singhAman05/LLD-System_Design
          path: _sources/LLD-System_Design

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        run: node scripts/sync-blog.mjs

      - name: Clean up sources
        run: rm -rf _sources

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          git diff --staged --quiet || git commit -m "content: sync blog posts [automated]"
          git push
